<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternTrack | Tasks</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top shadow-sm">
        <div class="container">

            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="dashboard.html">
                <svg width="36" height="36" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="8" y="8" width="84" height="84" rx="18" fill="#0d6efd"/>
                    <path d="M30 50L43 63L70 36" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>InternTrack</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                    <!-- DASHBOARD -->
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="bi bi-grid-fill me-1"></i> Dashboard
                        </a>
                    </li>
                    <!-- APPLICATIONS -->
                    <li class="nav-item">
                        <a class="nav-link active" href="applications.html">
                            <i class="bi bi-briefcase-fill me-1"></i> Applications
                        </a>
                    </li>
                    <!-- TASKS -->
                    <li class="nav-item">
                        <a class="nav-link" href="tasks.html">
                            <i class="bi bi-list-check me-1"></i> Tasks
                        </a>
                    </li>
                    <!-- PROFILE -->
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">
                            <i class="bi bi-person-circle me-1"></i> Profile
                        </a>
                    </li>
                    <!-- DARK MODE -->
                    <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
                        <button class="dark-mode-toggle" id="darkModeToggle">
                            <i class="bi bi-moon-stars-fill" id="darkModeIcon"></i>
                        </button>
                    </li>
                    <!-- LOGOUT -->
                    <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
                        <a href="index.html" class="btn btn-danger d-flex align-items-center gap-2 px-3">
                            <i class="bi bi-box-arrow-right"></i>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <!-- HEADER -->
    <section class="dashboard-header py-4 py-lg-5">
        <div class="container">

            <div class="row align-items-center gy-3">

                <div class="col-lg-8">
                    <h1 class="fw-bold mb-2">Task Management</h1>
                    <p class="dashboard-subtext text-muted mb-0">
                        Organise your internship preparation tasks and deadlines.
                    </p>
                </div>

                <div class="col-lg-4 text-lg-end">
                    <button class="btn btn-primary px-4 py-2" data-bs-toggle="modal" data-bs-target="#taskModal">
                        <i class="bi bi-plus-circle-fill me-2"></i>
                        Add Task
                    </button>
                </div>

            </div>

        </div>
    </section>


    <!-- CONTENT -->
    <section class="pb-5">

        <div class="container">

            <div class="row g-4" id="taskContainer">
                                
            </div>

        </div>

    </section>


    <!-- FOOTER -->
    <footer class="footer-section py-4 border-top bg-body-tertiary">
        <div class="container text-center">
            <small>© 2026 InternTrack System</small>
        </div>
    </footer>

    <!-- VIEW TASK MODAL -->
    <div class="modal fade" id="viewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Task Details</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <h4 id="viewTitle"></h4>
                    <p id="viewDesc"></p>
                    <p><strong>Due:</strong> <span id="viewDate"></span></p>
                </div>

            </div>
        </div>
    </div>
    <!-- VIEW TASK JS -->
    <script>
    function viewTask(id) {

        const task = tasks.find(t => t.id === id);

        document.getElementById("viewTitle").innerText = task.title;
        document.getElementById("viewDesc").innerText = task.desc;
        document.getElementById("viewDate").innerText = task.date;

        new bootstrap.Modal(document.getElementById("viewModal")).show();
    }
    </script>

    <!-- TO ADD TASK -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Task Title</label>
                        <input type="text" id="taskTitle" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea id="taskDesc" class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Due Date</label>
                        <input type="date" id="taskDate" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Priority</label>
                        <select id="taskPriority" class="form-select">
                            <option value="danger">High</option>
                            <option value="warning">Medium</option>
                            <option value="success">Low</option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="addTask()">Create Task</button>
                </div>

            </div>
        </div>
    </div>

    <!-- EDIT TASK -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Edit Task</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="editId">

                    <div class="mb-2">
                        <input class="form-control" id="editTitle">
                    </div>

                    <div class="mb-2">
                        <textarea class="form-control" id="editDesc"></textarea>
                    </div>

                    <div class="mb-2">
                        <input type="date" class="form-control" id="editDate">
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="saveEdit()">Save</button>
                </div>

            </div>
        </div>
    </div>


    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    let tasks = [
        {
            id: 1,
            title: "Update Resume",
            desc: "Improve internship resume and update latest portfolio projects.",
            date: "2026-08-12",
            priority: "danger",
            status: false
        },
        {
            id: 2,
            title: "Prepare Interview",
            desc: "Practice interview questions for Shopee internship session.",
            date: "2026-08-15",
            priority: "warning",
            status: false
        }
    ];
    </script>
    
    <script>
    function renderTasks() {

        const container = document.getElementById("taskContainer");
        container.innerHTML = "";

        tasks.forEach(task => {

        const badgeText =
        task.priority === "danger" ? "High Priority" :
        task.priority === "warning" ? "Medium Priority" :
                    "Low Priority";

        const completedClass = task.status ? "opacity-50" : "";

        container.insertAdjacentHTML("beforeend", `
        <div class="col-md-6 col-xl-4">
        <div class="card border-0 shadow-sm h-100 task-card ${completedClass}">
        <div class="card-body">

        <div class="d-flex justify-content-between align-items-start mb-3">

        <span class="badge bg-${task.priority}">${badgeText}</span>

        <div class="form-check">
            <input class="form-check-input"
            type="checkbox"
             ${task.status ? "checked" : ""}
            onchange="toggleTask(${task.id}, this)">
        </div>

        </div>

        <h5 class="fw-semibold mb-2">${task.title}</h5>
        <p class="text-muted small mb-4">${task.desc}</p>

        <div class="d-flex justify-content-between align-items-center">
        <small>
        <i class="bi bi-calendar-event me-1"></i>
        Due: ${task.date}
        </small>
        <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-primary"
            onclick="viewTask(${task.id})">
                  View
        </button>

         <button class="btn btn-sm btn-outline-warning"
        onclick="editTask(${task.id})">
        Edit
          </button>
       </div>
       </div>
        </div>
          </div>
          </div>`);
            });
          }

        renderTasks();
        </script>
    

    <!-- EDIT TASK JS -->
    <script>
    function editTask(id) {

        const task = tasks.find(t => t.id === id);

        document.getElementById("editId").value = task.id;
        document.getElementById("editTitle").value = task.title;
        document.getElementById("editDesc").value = task.desc;
        document.getElementById("editDate").value = task.date;

        new bootstrap.Modal(document.getElementById("editModal")).show();
    }

    function saveEdit() {

        const id = parseInt(document.getElementById("editId").value);

        const task = tasks.find(t => t.id === id);

        task.title = document.getElementById("editTitle").value;
        task.desc = document.getElementById("editDesc").value;
        task.date = document.getElementById("editDate").value;

        renderTasks();

        bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
    }
    </script>

    <!-- DARK MODE -->
    <script>

        const darkModeToggle = document.getElementById('darkModeToggle');
        const darkModeIcon = document.getElementById('darkModeIcon');
        const htmlElement = document.documentElement;

        const currentTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-bs-theme', currentTheme);
        updateIcon(currentTheme);

        darkModeToggle.addEventListener('click', ()=> {

            const currentTheme = htmlElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);

        });

        function updateIcon(theme) {
            darkModeIcon.className = theme === 'dark'
                ? 'bi bi-sun-fill'
                : 'bi bi-moon-stars-fill';
        }

    </script>

    <!-- ADD TASK SCRIPT -->
    <script>
    function addTask() {

        const title = document.getElementById("taskTitle").value;
        const desc = document.getElementById("taskDesc").value;
        const date = document.getElementById("taskDate").value;
        const priority = document.getElementById("taskPriority").value;

        if (!title || !desc || !date) {
            alert("Fill in all fields first.");
            return;
        }

        const newTask = {
            id: Date.now(),
            title,
            desc,
            date,
            priority,
            status: false
        };

        tasks.push(newTask);

        renderTasks();

        bootstrap.Modal.getInstance(document.getElementById('taskModal')).hide();

        document.getElementById("taskTitle").value = "";
        document.getElementById("taskDesc").value = "";
        document.getElementById("taskDate").value = "";
    }
    </script>

    <!-- TASK STATUS -->
    <script>
    function toggleTask(id, checkbox) {

        const task = tasks.find(t => t.id === id);
        task.status = checkbox.checked;

        renderTasks();
    }
    </script>

</body>
</html>
