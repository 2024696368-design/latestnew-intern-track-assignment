<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternTrack | Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body id="vanta-bg">

    <div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center px-3 py-4">
        <div class="card login-card shadow-lg border-0 overflow-hidden w-100 mx-2 mx-sm-0" style="max-width: 900px;">
            <div class="row g-0 h-100">

                <!-- LEFT SIDE -->
                <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center align-items-center login-left-side">

                    <!-- Custom SVG Logo -->
                    <div class="logo-wrapper mb-4">
                        <svg width="95" height="95" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="8" y="8" width="84" height="84" rx="18" fill="#0d6efd"/>
                            <path d="M30 50L43 63L70 36" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>

                    <h2 class="app-title">InternTrack</h2>
                    <p class="app-subtitle text-center px-4">
                        Internship application management system for students.
                    </p>
                </div>

                <!-- RIGHT SIDE -->
                 <!-- MOBILE BRAND HEADER -->
                <div class="d-flex d-lg-none flex-column align-items-center mb-4 mt-4">
                    
                    <svg width="75" height="75" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="8" y="8" width="84" height="84" rx="18" fill="#0d6efd"/>
                        <path d="M30 50L43 63L70 36" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>

                    <h3 class="fw-bold mt-2 mb-0 text-primary">InternTrack</h3>
                    <p class="app-subtitle text-center px-4">
                        Internship application management system for students.
                    </p>

                </div>
                <div class="col-lg-6 col-12 bg-white">
                    <div class="p-4 p-lg-5 h-100 d-flex flex-column gap-2">
                        <div>
                            <h3 class="fw-bold mb-1">Welcome, Student.</h3>
                            <p class="text-muted mb-4">Login to continue your internship journey.</p>
                        </div>

                        <!-- Error Alert -->
                        <div id="errorBox" class="alert alert-danger d-none" role="alert">
                            Invalid email or password.
                        </div>

                        <!-- FORM -->
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-envelope-fill"></i>
                                    </span>
                                    <input
                                        type="email"
                                        class="form-control"
                                        id="email"
                                        placeholder="student@email.com"
                                        required
                                    >
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-lock-fill"></i>
                                    </span>
                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        placeholder="Enter your password"
                                        required
                                    >
                                    <button
                                        class="btn btn-outline-secondary"
                                        type="button"
                                        id="togglePassword"
                                    >
                                        <i class="bi bi-eye-fill"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">
                                        Remember me
                                    </label>
                                </div>
                                <a href="#" class="forgot-link text-decoration-none">
                                    Forgot Password?
                                </a>
                            </div>

                            <!-- BUTTON RIGHT BOTTOM -->
                            <div class="text-center text-lg-end mt-4">
                                <button type="submit" class="btn btn-primary px-4 py-2 login-btn">
                                    Login <i></i>
                                </button>
                            </div>
                        </form>
                        <div class="mt-auto text-center pt-4">
                            <p class="text-muted small mb-0">
                                DEMO Login: student@gmail.com | ps:12345
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Vanta Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds.min.js"></script>

    <script>

        VANTA.CLOUDS({
            el: "#vanta-bg",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            skyColor: 0x77bdfb,
            cloudColor: 0xffffff,
            cloudShadowColor: 0x4d5b7c,
            sunColor: 0xffc107,
            speed: 1.10
        });

        // PASSWORD TOGGLE
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {

            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            this.innerHTML = type === 'password'
                ? '<i class="bi bi-eye-fill"></i>'
                : '<i class="bi bi-eye-slash-fill"></i>';
        });

        // SIMULATED LOGIN VALIDATION
        const loginForm = document.getElementById('loginForm');
        const errorBox = document.getElementById('errorBox');
        loginForm.addEventListener('submit', function(e){
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            // Fake validation
            if(email !== '' && password.length >= 5){
                errorBox.classList.add('d-none');

                // redirect
                window.location.href = 'dashboard.html';
            } else {
                errorBox.classList.remove('d-none');
            }
        });
    </script>

</body>
</html>
